name: CI Dev

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
    types: [ opened, synchronize, reopened ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Maven Build
        run: mvn clean package -DskipTests

      - name: Docker Build
        run: docker build . -t the-moments:latest